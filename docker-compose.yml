version: "3.9"

# =============================================================================
# Cyber Academy E-DEFENCE — Docker Compose (Development)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: cyberacademy_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cyberacademy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cyberacademy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberacademy -d cyberacademy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cyberacademy_net

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cyberacademy_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cyberacademy_net

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: cyberacademy_minio
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: cyberacademy
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cyberacademy_net

  # ---------------------------------------------------------------------------
  # Moodle 4.x LMS
  # ---------------------------------------------------------------------------
  moodle:
    image: bitnami/moodle:4
    container_name: cyberacademy_moodle
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MOODLE_DATABASE_TYPE: pgsql
      MOODLE_DATABASE_HOST: db
      MOODLE_DATABASE_PORT_NUMBER: 5432
      MOODLE_DATABASE_NAME: moodle
      MOODLE_DATABASE_USER: cyberacademy
      MOODLE_DATABASE_PASSWORD: ${DB_PASSWORD}
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: ${MOODLE_ADMIN_PASSWORD}
      MOODLE_EMAIL: admin@edefence.tech
      MOODLE_SITE_NAME: "Cyber Academy E-DEFENCE"
      MOODLE_SKIP_BOOTSTRAP: "no"
      BITNAMI_DEBUG: "false"
    volumes:
      - moodle_data:/bitnami/moodle
      - ./moodle/plugins:/bitnami/moodledata/plugins
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login/index.php"]
      interval: 60s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks:
      - cyberacademy_net

  # ---------------------------------------------------------------------------
  # Guacamole Daemon (guacd) — Cyber Range proxy
  # ---------------------------------------------------------------------------
  guacd:
    image: guacamole/guacd:latest
    container_name: cyberacademy_guacd
    restart: unless-stopped
    volumes:
      - guacd_drive:/drive
      - guacd_record:/record
    ports:
      - "4822:4822"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - cyberacademy_net

  # ---------------------------------------------------------------------------
  # Apache Guacamole — Browser-based RDP/SSH/VNC
  # ---------------------------------------------------------------------------
  guacamole:
    image: guacamole/guacamole:latest
    container_name: cyberacademy_guacamole
    restart: unless-stopped
    depends_on:
      guacd:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      POSTGRES_HOSTNAME: db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: guacamole_db
      POSTGRES_USER: cyberacademy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/guacamole/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - cyberacademy_net

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: academy_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - uploads_data:/var/cyberacademy/uploads
      - ./backend:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
      --proxy-headers
      --forwarded-allow-ips='*'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cyberacademy_net
      - edefence_net

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberacademy_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - uploads_data:/var/cyberacademy/uploads
      - ./backend:/app
    command: >
      celery -A app.tasks.celery_app worker
      -Q default,payments,badges,range
      -l info
      --concurrency=4
    networks:
      - cyberacademy_net

  # ---------------------------------------------------------------------------
  # Celery Beat (scheduler)
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberacademy_celery_beat
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat-schedule"]
      interval: 60s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      celery -A app.tasks.celery_app beat --schedule /tmp/celerybeat-schedule
      -l info
      
    networks:
      - cyberacademy_net

  # ---------------------------------------------------------------------------
  # Flutter Web Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyberacademy_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - cyberacademy_net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  moodle_data:
    driver: local
  guacd_drive:
    driver: local
  guacd_record:
    driver: local
  uploads_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  edefence_net:
    external: true
    name: edefence_net
  cyberacademy_net:
    driver: bridge
    name: cyberacademy_net
