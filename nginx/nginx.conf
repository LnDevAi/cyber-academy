# =============================================================================
# Cyber Academy E-DEFENCE — Nginx Reverse Proxy Configuration
# Domains:
#   academy.edefence.tech       → Flutter Frontend   (port 3000)
#   academy-api.edefence.tech   → FastAPI Backend    (port 8000)
#   range.edefence.tech         → Guacamole UI       (port 8081)
#   lms.edefence.tech           → Moodle LMS         (port 8080)
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --------------------------------------------------------------------------
    # Logging
    # --------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # --------------------------------------------------------------------------
    # Performance
    # --------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # --------------------------------------------------------------------------
    # Gzip
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/wasm
        application/xml
        font/opentype
        image/svg+xml
        text/css
        text/plain;

    # --------------------------------------------------------------------------
    # Rate Limiting
    # --------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # --------------------------------------------------------------------------
    # SSL Defaults
    # --------------------------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # --------------------------------------------------------------------------
    # Upstream definitions
    # --------------------------------------------------------------------------
    upstream flutter_frontend {
        server frontend:80;
        keepalive 32;
    }

    upstream fastapi_backend {
        server backend:8000;
        keepalive 32;
    }

    upstream guacamole_ui {
        server guacamole:8080;
        keepalive 16;
    }

    upstream moodle_lms {
        server moodle:8080;
        keepalive 16;
    }

    # ==========================================================================
    # HTTP → HTTPS redirect for all domains
    # ==========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name academy.edefence.tech academy-api.edefence.tech range.edefence.tech lms.edefence.tech;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================================================
    # academy.edefence.tech → Flutter Frontend
    # ==========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name academy.edefence.tech;

        ssl_certificate /etc/letsencrypt/live/academy.edefence.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/academy.edefence.tech/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/academy.edefence.tech/chain.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://academy-api.edefence.tech wss://academy-api.edefence.tech; frame-src 'self' https://range.edefence.tech https://lms.edefence.tech;" always;

        # Flutter SPA
        location / {
            proxy_pass http://flutter_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_cache_bypass $http_upgrade;
        }

        # Health check
        location /health {
            access_log off;
            proxy_pass http://flutter_frontend/health;
        }
    }

    # ==========================================================================
    # academy-api.edefence.tech → FastAPI Backend
    # ==========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name academy-api.edefence.tech;

        ssl_certificate /etc/letsencrypt/live/academy-api.edefence.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/academy-api.edefence.tech/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/academy-api.edefence.tech/chain.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Large uploads for course content
        client_max_body_size 100M;
        client_body_timeout 120s;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;

        # API rate limiting
        location /api/auth/ {
            limit_req zone=login_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # WebSocket support (for FastAPI WebSockets — live lab events)
        location /api/ws/ {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }

        # General API
        location / {
            limit_req zone=api_limit burst=50 nodelay;
            limit_req_status 429;
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }

    # ==========================================================================
    # range.edefence.tech → Apache Guacamole (port 8081)
    # WebSocket upgrade required for Guacamole tunnel protocol
    # ==========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name range.edefence.tech;

        ssl_certificate /etc/letsencrypt/live/range.edefence.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/range.edefence.tech/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/range.edefence.tech/chain.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        client_max_body_size 10M;

        # Guacamole requires WebSocket for its tunnel
        location /guacamole/ {
            proxy_pass http://guacamole_ui/guacamole/;
            proxy_http_version 1.1;

            # WebSocket upgrade headers — REQUIRED for Guacamole
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Guacamole timeouts (long-running RDP sessions)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 60s;

            # Disable buffering for WebSocket/streaming
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Root redirect to Guacamole
        location = / {
            return 301 /guacamole/;
        }
    }

    # ==========================================================================
    # lms.edefence.tech → Moodle LMS (port 8080)
    # ==========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name lms.edefence.tech;

        ssl_certificate /etc/letsencrypt/live/lms.edefence.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lms.edefence.tech/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/lms.edefence.tech/chain.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Large uploads for Moodle course content (SCORM, videos)
        client_max_body_size 200M;
        client_body_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        location / {
            proxy_pass http://moodle_lms;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Moodle session cookie handling
            proxy_cookie_path / "/; HTTPOnly; Secure; SameSite=Lax";
        }

        # Moodle Web Services API — higher rate allowed
        location /webservice/ {
            proxy_pass http://moodle_lms;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }
    }
}
