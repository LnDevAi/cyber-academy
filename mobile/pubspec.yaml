name: cyber_academy_mobile
description: Cyber Academy E-DÉFENCE — Application mobile formation cybersécurité
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^13.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.2.0
  google_fonts: ^6.1.0
  fl_chart: ^0.67.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.3
  flutter_markdown: ^0.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
