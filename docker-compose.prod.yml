version: "3.9"

# =============================================================================
# Cyber Academy E-DEFENCE — Docker Compose (Production)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: cyberacademy_db
    restart: always
    environment:
      POSTGRES_USER: cyberacademy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cyberacademy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberacademy -d cyberacademy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cyberacademy_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: cyberacademy_minio
    restart: always
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: cyberacademy
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: https://minio-console.edefence.tech
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Moodle 4.x LMS
  # ---------------------------------------------------------------------------
  moodle:
    image: bitnami/moodle:4
    container_name: cyberacademy_moodle
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MOODLE_DATABASE_TYPE: pgsql
      MOODLE_DATABASE_HOST: db
      MOODLE_DATABASE_PORT_NUMBER: 5432
      MOODLE_DATABASE_NAME: moodle
      MOODLE_DATABASE_USER: cyberacademy
      MOODLE_DATABASE_PASSWORD: ${DB_PASSWORD}
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: ${MOODLE_ADMIN_PASSWORD}
      MOODLE_EMAIL: admin@edefence.tech
      MOODLE_SITE_NAME: "Cyber Academy E-DEFENCE"
      MOODLE_SKIP_BOOTSTRAP: "no"
      BITNAMI_DEBUG: "false"
      PHP_MEMORY_LIMIT: "512M"
      PHP_MAX_UPLOAD_SIZE: "200M"
      PHP_POST_MAX_SIZE: "200M"
    volumes:
      - moodle_data:/bitnami/moodle
      - ./moodle/plugins:/bitnami/moodledata/plugins
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login/index.php"]
      interval: 60s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Guacamole Daemon (guacd)
  # ---------------------------------------------------------------------------
  guacd:
    image: guacamole/guacd:latest
    container_name: cyberacademy_guacd
    restart: always
    volumes:
      - guacd_drive:/drive
      - guacd_record:/record
    expose:
      - "4822"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Apache Guacamole
  # ---------------------------------------------------------------------------
  guacamole:
    image: guacamole/guacamole:latest
    container_name: cyberacademy_guacamole
    restart: always
    depends_on:
      guacd:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      POSTGRES_HOSTNAME: db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: guacamole_db
      POSTGRES_USER: cyberacademy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/guacamole/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # FastAPI Backend (Gunicorn + UvicornWorker — Production)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: academy_api
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - uploads_data:/var/cyberacademy/uploads
      - chromadb_data:/var/cyberacademy/chromadb
    expose:
      - "8000"
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w 4
      -b 0.0.0.0:8000
      --timeout 120
      --keep-alive 5
      --access-logfile -
      --error-logfile -
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - edefence_net
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Celery Worker (Production — 8 concurrent)
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cyberacademy_celery_worker
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - uploads_data:/var/cyberacademy/uploads
      - chromadb_data:/var/cyberacademy/chromadb
    command: >
      celery -A app.tasks.celery_app worker
      -Q default,payments,badges,range
      -l info
      --concurrency=8
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 30s
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Celery Beat (Production scheduler)
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cyberacademy_celery_beat
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/celerybeat-schedule:/app/celerybeat-schedule
    command: >
      celery -A app.tasks.celery_app beat
      -l info
      --scheduler celery.schedulers:DatabaseScheduler
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Flutter Web Frontend (Production — --release build served by nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_MODE: release
    container_name: academy_frontend
    restart: always
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - edefence_net
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  moodle_data:
    driver: local
  guacd_drive:
    driver: local
  guacd_record:
    driver: local
  uploads_data:
    driver: local
  chromadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CHROMADB_PERSIST_PATH:-/opt/cyberacademy/chromadb}

# =============================================================================
# Networks
# =============================================================================
networks:
  edefence_net:
    external: true
    name: edefence_net
  academy_internal:
    driver: bridge
    name: academy_internal
