version: "3.9"

# =============================================================================
# Cyber Academy E-DEFENCE — Docker Compose (Production)
# Ports : API→8002, Frontend→3002, MinIO API→9002, MinIO Console→9003
# Ports 80/443/8000/3000 déjà utilisés par edefence-portail
# Guacamole + Moodle désactivés pour le premier déploiement
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: cyberacademy_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cyberacademy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cyberacademy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberacademy -d cyberacademy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cyberacademy_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # Port 9002 (API) + 9003 (Console) — 9000/9001 pris par e-audit-360
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: cyberacademy_minio
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: cyberacademy
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Moodle 4.x LMS — désactivé (premier déploiement, service lourd)
  # Réactiver en décommentant après stabilisation de l'API
  # ---------------------------------------------------------------------------
  # moodle:
  #   image: bitnami/moodle:4
  #   container_name: cyberacademy_moodle
  #   restart: unless-stopped
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     MOODLE_DATABASE_TYPE: pgsql
  #     MOODLE_DATABASE_HOST: db
  #     MOODLE_DATABASE_PORT_NUMBER: 5432
  #     MOODLE_DATABASE_NAME: moodle
  #     MOODLE_DATABASE_USER: cyberacademy
  #     MOODLE_DATABASE_PASSWORD: ${DB_PASSWORD}
  #     MOODLE_USERNAME: admin
  #     MOODLE_PASSWORD: ${MOODLE_ADMIN_PASSWORD}
  #     MOODLE_EMAIL: admin@edefence.tech
  #     MOODLE_SITE_NAME: "Cyber Academy E-DEFENCE"
  #   volumes:
  #     - moodle_data:/bitnami/moodle
  #   ports:
  #     - "8083:8080"
  #   networks:
  #     - edefence_net
  #     - academy_internal

  # ---------------------------------------------------------------------------
  # Guacamole Daemon (guacd) — désactivé (premier déploiement)
  # ---------------------------------------------------------------------------
  # guacd:
  #   image: guacamole/guacd:latest
  #   container_name: cyberacademy_guacd
  #   restart: unless-stopped
  #   volumes:
  #     - guacd_drive:/drive
  #     - guacd_record:/record
  #   expose:
  #     - "4822"
  #   networks:
  #     - academy_internal

  # ---------------------------------------------------------------------------
  # Apache Guacamole — désactivé (premier déploiement)
  # Port 8082 — 8080 utilisé par Moodle, 8081 réservé
  # ---------------------------------------------------------------------------
  # guacamole:
  #   image: guacamole/guacamole:latest
  #   container_name: cyberacademy_guacamole
  #   restart: unless-stopped
  #   depends_on:
  #     - guacd
  #     - db
  #   environment:
  #     GUACD_HOSTNAME: guacd
  #     GUACD_PORT: 4822
  #     POSTGRES_HOSTNAME: db
  #     POSTGRES_PORT: 5432
  #     POSTGRES_DATABASE: guacamole_db
  #     POSTGRES_USER: cyberacademy
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #   ports:
  #     - "8082:8080"
  #   networks:
  #     - edefence_net
  #     - academy_internal

  # ---------------------------------------------------------------------------
  # FastAPI Backend — Port 8002 (8000 pris portail, 8001 pris e-audit-360)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: academy_api
    restart: unless-stopped
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - uploads_data:/var/cyberacademy/uploads
      - chromadb_data:/var/cyberacademy/chromadb
    ports:
      - "8002:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --loop uvloop
      --http httptools
      --access-log
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - edefence_net
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cyberacademy_celery_worker
    restart: unless-stopped
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - uploads_data:/var/cyberacademy/uploads
      - chromadb_data:/var/cyberacademy/chromadb
    command: >
      celery -A app.tasks.celery_app worker
      -Q default,payments,badges,range
      -l info
      --concurrency=4
    networks:
      - academy_internal
      - cyberacademy_net
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Celery Beat (scheduler)
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cyberacademy_celery_beat
    restart: unless-stopped
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - celerybeat_data:/app
    command: >
      celery -A app.tasks.celery_app beat
      -l info
      -s /app/celerybeat-schedule
    networks:
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Flutter Web Frontend — Port 3002 (3000 pris portail, 3001 réservé)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_MODE: release
    container_name: academy_frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - edefence_net
      - academy_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  uploads_data:
    driver: local
  chromadb_data:
    driver: local
  celerybeat_data:
    driver: local
  # Volumes Guacamole/Moodle — décommenter si services réactivés
  # guacd_drive:
  #   driver: local
  # guacd_record:
  #   driver: local
  # moodle_data:
  #   driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  edefence_net:
    external: true
    name: edefence_net
  cyberacademy_net:
    external: true
    name: cyberacademy_net
  academy_internal:
    driver: bridge
    name: academy_internal
