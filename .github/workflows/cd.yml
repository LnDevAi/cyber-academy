# =============================================================================
# Cyber Academy E-DEFENCE — Continuous Deployment
# Triggers on push to main or version tags (v*)
# Deploys to production server via SSH
# =============================================================================

name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Deploy to production
  # ===========================================================================
  deploy:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    environment: production

    # Only deploy if CI passes (on main) or if this is a version tag
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine deploy version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          timeout: 600s
          command_timeout: 30m
          script: |
            set -euo pipefail

            echo "=========================================="
            echo "Cyber Academy E-DEFENCE — Deploy"
            echo "Version: ${{ steps.version.outputs.version }}"
            echo "Triggered by: ${{ github.actor }}"
            echo "Ref: ${{ github.ref }}"
            echo "=========================================="

            # Navigate to deployment directory
            cd /opt/cyberacademy

            echo "[1/5] Pulling latest code..."
            git fetch --all
            git checkout ${{ github.sha }} 2>/dev/null || git pull origin main

            echo "[2/5] Building and restarting services..."
            docker compose -f docker-compose.prod.yml pull db redis
            docker compose -f docker-compose.prod.yml up -d --build \
              backend \
              frontend \
              celery_worker \
              celery_beat

            echo "[3/5] Waiting for backend to be healthy..."
            RETRY=0
            until docker compose -f docker-compose.prod.yml exec -T backend \
              curl -sf http://localhost:8000/api/health > /dev/null 2>&1; do
              RETRY=$((RETRY + 1))
              if [[ $RETRY -ge 20 ]]; then
                echo "ERROR: Backend did not become healthy after 20 retries"
                docker compose -f docker-compose.prod.yml logs --tail=50 backend
                exit 1
              fi
              echo "  Waiting (attempt $RETRY/20)..."
              sleep 15
            done

            echo "[4/5] Running Alembic migrations..."
            docker compose -f docker-compose.prod.yml exec -T backend \
              alembic upgrade head

            echo "[5/5] Final health check..."
            curl -sf https://academy-api.edefence.tech/api/health || {
              echo "ERROR: Public health check failed!"
              exit 1
            }

            echo ""
            echo "Deploy complete! Services status:"
            docker compose -f docker-compose.prod.yml ps

      - name: Prune old Docker images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          timeout: 120s
          script: |
            docker image prune -f
            docker system prune -f --volumes=false
            echo "Docker image cleanup complete."

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deployment of ${{ steps.version.outputs.version }} to production succeeded!"
          echo "Deployed by: ${{ github.actor }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "DEPLOYMENT FAILED for ${{ steps.version.outputs.version }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Check GitHub Actions logs and SSH into production server."

  # ===========================================================================
  # Create GitHub Release (on version tags only)
  # ===========================================================================
  release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: deploy

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Cyber Academy E-DEFENCE ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          body: |
            ## Cyber Academy E-DEFENCE ${{ github.ref_name }}

            Deployed to production by @${{ github.actor }}.

            ### Deployment Info
            - **Host**: academy.edefence.tech
            - **API**: academy-api.edefence.tech
            - **Cyber Range**: range.edefence.tech
            - **LMS**: lms.edefence.tech

            See [CHANGELOG.md](CHANGELOG.md) for full release notes.
