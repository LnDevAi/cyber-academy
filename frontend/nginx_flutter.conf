# =============================================================================
# Cyber Academy E-DEFENCE — Flutter Web Nginx Configuration
# Handles Flutter SPA routing: all paths → index.html
# =============================================================================

server {
    listen 80;
    listen [::]:80;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --------------------------------------------------------------------------
    # Gzip Compression
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/dart
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/xml;

    # --------------------------------------------------------------------------
    # Security Headers
    # --------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --------------------------------------------------------------------------
    # Flutter SPA — fallback all routes to index.html
    # --------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------------------------
    # Flutter Service Worker — no cache
    # --------------------------------------------------------------------------
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # --------------------------------------------------------------------------
    # CanvasKit WASM & Flutter assets — long-term cache with content hash
    # --------------------------------------------------------------------------
    location ~* \.(wasm|js|css|png|jpg|jpeg|gif|ico|svg|ttf|woff|woff2|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --------------------------------------------------------------------------
    # Manifest & PWA files — short cache
    # --------------------------------------------------------------------------
    location ~* \.(manifest\.json|appcache)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # --------------------------------------------------------------------------
    # Health check endpoint
    # --------------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # --------------------------------------------------------------------------
    # Error pages
    # --------------------------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # --------------------------------------------------------------------------
    # Logging
    # --------------------------------------------------------------------------
    access_log /var/log/nginx/flutter_access.log;
    error_log /var/log/nginx/flutter_error.log warn;
}
